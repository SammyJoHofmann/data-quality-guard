app:
  id: ari:cloud:ecosystem::app/de167c15-76e5-4b11-b62b-39f960d68a3f
  runtime:
    name: nodejs22.x

modules:
  # === JIRA: Projekt-Dashboard (Custom UI) ===
  jira:projectPage:
    - key: dq-project-dashboard
      resource: main
      resolver:
        function: jira-resolver
      title: Data Quality Score

  # === JIRA: Issue Panel (Custom UI) ===
  jira:issuePanel:
    - key: dq-issue-panel
      resource: main
      resolver:
        function: issue-resolver
      title: Quality Check
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg

  # === CONFLUENCE: Global Page (Custom UI) ===
  confluence:globalPage:
    - key: dq-confluence-dashboard
      resource: main
      resolver:
        function: confluence-resolver
      route: data-quality
      title: Content Quality Dashboard

  # === ROVO AGENT ===
  rovo:agent:
    - key: dq-agent
      name: Data Quality Guard
      description: >
        AI agent that analyzes your Jira and Confluence data quality. Ask about
        stale tickets, contradictions, or quality scores.
      prompt: >
        You are the Data Quality Guard agent. You help teams maintain
        high-quality project data in Jira and Confluence. You can: 1. Scan
        projects for stale issues and outdated pages 2. Find contradictions
        between Jira tickets and Confluence docs 3. Report quality scores and
        trends 4. Suggest improvements Always be specific about which items need
        attention and why.
      conversationStarters:
        - Scan my current project for data quality issues
        - What are the biggest quality problems?
        - Show me stale tickets that need attention
        - Find contradictions between docs and tickets
      actions:
        - scan-project-action
        - get-report-action

  action:
    - key: scan-project-action
      function: scan-project
      actionVerb: TRIGGER
      description: Scans a Jira project for data quality issues
      inputs:
        projectKey:
          title: Project Key
          type: string
          required: true
          description: The Jira project key to scan

    - key: get-report-action
      function: get-report
      actionVerb: GET
      description: Gets the data quality report for a project
      inputs:
        projectKey:
          title: Project Key
          type: string
          required: true
          description: The Jira project key to get the report for

  # === DATABASE ===
  sql:
    - key: main
      engine: mysql

  # === SCHEDULED TRIGGERS ===
  scheduledTrigger:
    - key: hourly-scan
      function: scheduled-scan
      interval: hour

    - key: daily-report
      function: scheduled-report
      interval: day

  # === ASYNC EVENT QUEUES ===
  consumer:
    - key: quality-check-consumer
      queue: quality-checks
      function: process-quality-check

  # === FUNCTIONS ===
  function:
    - key: jira-resolver
      handler: resolvers/jira-resolver.handler
    - key: issue-resolver
      handler: resolvers/issue-resolver.handler
    - key: confluence-resolver
      handler: resolvers/confluence-resolver.handler
    - key: scheduled-scan
      handler: triggers/scheduled-scan.handler
      timeoutSeconds: 900
    - key: scheduled-report
      handler: triggers/scheduled-report.handler
      timeoutSeconds: 300
    - key: process-quality-check
      handler: consumers/quality-check.handler
      timeoutSeconds: 600
    - key: scan-project
      handler: actions/scan-project.handler
    - key: get-report
      handler: actions/get-report.handler

# === UI RESOURCES (Custom UI — built React app) ===
resources:
  - key: main
    path: static/frontend/build

# === PERMISSIONS ===
permissions:
  content:
    styles:
      - 'unsafe-inline'
  scopes:
    - read:jira-work
    - read:jira-user
    - read:confluence-content.all
    - read:confluence-space.summary
    - search:confluence
    - read:page:confluence
    - read:space:confluence
  external:
    fetch:
      backend:
        - api.anthropic.com
        - generativelanguage.googleapis.com
        - api.openai.com
